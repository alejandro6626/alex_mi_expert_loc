<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Alex — MI Expert</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #0d47a1 0%, #1976d2 100%);
            --accent-blue: #00bcd4;
            --bg-clinical: #f0f4f8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { 
            height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; 
            position: fixed; background: var(--bg-clinical);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #app { display: flex; flex-direction: column; height: 100dvh; width: 100%; background: #fff; position: relative; }
        @media (min-width: 768px) {
            #app { max-width: 500px; margin: 0 auto; border-left: 1px solid #e0e8f0; border-right: 1px solid #e0e8f0; }
        }
        .header { height: 60px; background: var(--primary-gradient); padding: 0 16px; display: flex; align-items: center; color: white; flex-shrink: 0; }
        .hname { font-size: 16px; font-weight: 700; text-transform: uppercase; }
        .msgs { flex: 1; overflow-y: auto; padding: 16px 16px 120px 16px; background: #f8faff; -webkit-overflow-scrolling: touch; }
        .msg { display: flex; width: 100%; margin-bottom: 12px; }
        .bubble { max-width: 88%; padding: 12px 16px; font-size: 16px; line-height: 1.5; border-radius: 12px; word-wrap: break-word; }
        .msg.agent .bubble { background: #fff; border-left: 5px solid var(--accent-blue); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .msg.user { justify-content: flex-end; }
        .msg.user .bubble { background: var(--primary-gradient); color: #fff; }
        .input-row { 
            position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; 
            padding: 12px 16px; display: flex; align-items: flex-end; gap: 10px; 
            border-top: 1px solid #eef2f7; padding-bottom: max(16px, env(safe-area-inset-bottom));
        }
        @media (min-width: 768px) { .input-row { width: 500px; left: 50%; transform: translateX(-50%); } }
        textarea { flex: 1; min-height: 44px; max-height: 100px; padding: 11px 16px; font-size: 16px; border: 1.5px solid #d1d9e6; border-radius: 22px; outline: none; background: #f1f4f9; resize: none; }
        #sbtn { width: 44px; height: 44px; border-radius: 50%; background: var(--primary-gradient); border: none; color: white; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .typing-container { display: flex; align-items: center; gap: 8px; }
        .pulse-bar { display: flex; align-items: flex-end; gap: 3px; height: 16px; }
        .bar { width: 4px; background: var(--accent-blue); height: 100%; animation: pulse-mobile 0.8s infinite ease-in-out; }
        @keyframes pulse-mobile { 0%, 100% { transform: scaleY(0.4); opacity: 0.4; } 50% { transform: scaleY(1.0); opacity: 1; } }
    </style>
</head>
<body>
<div id="app">
    <div class="header"><div class="hname">Alex — MI Expert</div></div>
    <div class="msgs" id="msgs">
        <div id="welcome" style="text-align:center; padding-top:40px; color:#666;">
            <strong>Interface Ready</strong><br>Enter your query below.
        </div>
    </div>
    <div class="input-row">
        <textarea id="inp" placeholder="Type clinical query..."></textarea>
        <button id="sbtn" onclick="send()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>
</div>

<script>
// 1. CONFIGURATION
const BACKEND_URL = 'https://alex-mi-expert-490885426117.europe-west1.run.app/chat';
//const BACKEND_URL = '/chat';
let busy = false;

const inp = document.getElementById('inp');
const msgs = document.getElementById('msgs');
const sbtn = document.getElementById('sbtn');

const history = [];

function resetHeight() { inp.style.height = 'auto'; inp.style.height = inp.scrollHeight + 'px'; }
inp.addEventListener('input', resetHeight);

// Add this configuration BEFORE your addMsg function
marked.setOptions({
    breaks: true,
    gfm: true
});

// Custom renderer to force links to open in a new tab
const renderer = new marked.Renderer();
renderer.link = function(href, title, text) {
    return `<a href="${href}" title="${title || ''}" target="_blank" rel="noopener noreferrer">${text}</a>`;
};

function addMsg(role, text, isError = false) {
    document.getElementById('welcome')?.remove();
    const d = document.createElement('div');
    d.className = 'msg ' + role;
    const style = isError ? 'style="border-left: 5px solid #d32f2f; background: #fff5f5;"' : '';
    
    let formatted = text;

    if (role === 'agent') {
        // 1. Fix "Wildcards": Convert markdown list asterisks (*) into clean bullet points
        formatted = formatted.replace(/^\s*\*\s+/gm, '• ');
        
        // 2. Fix "Bold Wildcards": If it looks like "* Myalgia:", make it "<strong>Myalgia:</strong>"
        formatted = formatted.replace(/\*\s+\*\*(.*?)\*\*:/g, '<strong>$1:</strong>');

        // 3. Fix "Bold Text": Standard **bold** to <strong>
        formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

        // 4. Fix "Chunky Text": Ensure double newlines create a real paragraph break
        // We replace double newlines with a spacing div for better clinical readability
        formatted = formatted.replace(/\n\n/g, '<div style="margin-bottom: 12px;"></div>');
        
        // 5. Fix "Carrier Returns": Convert single newlines to <br>
        formatted = formatted.replace(/\n/g, '<br>');
    } else {
        // User messages stay simple
        formatted = text.replace(/\n/g, '<br>');
    }
    
    d.innerHTML = `<div class="bubble" ${style}>${formatted}</div>`;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
}

async function send() {
    const val = inp.value.trim();
    if (!val || busy) return;

    busy = true;
    sbtn.style.opacity = "0.3";
    addMsg('user', val);
    history.push({ role: 'user', parts: [{ text: val }] });
    inp.value = '';
    resetHeight();

    const t = document.createElement('div');
    t.id = 'typing'; t.className = 'msg agent';
    t.innerHTML = `<div class="bubble"><div class="typing-container"><div class="pulse-bar"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div><span style="font-size:11px; font-weight:bold; color:#1a237e; margin-left:8px;">ANALYZING...</span></div></div>`;
    msgs.appendChild(t);
    msgs.scrollTop = msgs.scrollHeight;

    try {
        const res = await fetch(BACKEND_URL, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'ngrok-skip-browser-warning': 'true' 
            },
            body: JSON.stringify({ contents: history })
        });

        // 1. Check if the server actually responded
        if (!res.ok) {
            const errorData = await res.json();
            throw new Error(errorData.error || `HTTP Error ${res.status}`);
        }

        const data = await res.json();
        document.getElementById('typing')?.remove();

        // 2. Safely check for the reply
        if (data.candidates && data.candidates[0] && data.candidates[0].content) {
            const reply = data.candidates[0].content.parts[0].text;
            addMsg('agent', reply);
            history.push({ role: 'model', parts: [{ text: reply }] });
        } else if (data.promptFeedback) {
            addMsg('agent', "<strong>Safety Block:</strong> Query flagged by content filters.", true);
        } else {
            // This will show you exactly what the bad data looks like
            console.error("Malformed Data:", data);
            throw new Error("Invalid response format from AI.");
        }

    } catch (e) {
        document.getElementById('typing')?.remove();
        addMsg('agent', `<strong>Debug Info:</strong> ${e.message}`, true);
    } finally {
        busy = false;
        sbtn.style.opacity = "1";
    }
}
</script>
</body>
</html>
